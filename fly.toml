app = "leapconnect"
primary_region = "ams"

[build]
dockerfile = "Dockerfile"

[env]
HISTORY_DB_PATH = "/data/history.db"

[[services]]
protocol = "tcp"
internal_port = 8099

[[services.ports]]
port = 80
handlers = ["http"]

[[services.ports]]
port = 443
handlers = ["http", "tls"]

[services.concurrency]
type = "connections"
hard_limit = 1000
soft_limit = 500

[[mounts]]
source = "leapconnect_data"
destination = "/data"
