<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leapmotor — Vehicle Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ================================================================
   LEAPMOTOR COMMAND CENTER — Dark cinematic automotive dashboard
   Aesthetic: Instrument-cluster meets luxury control room
   ================================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Core palette — deep charcoal with electric cyan accents */
  --bg-primary: #0a0c10;
  --bg-secondary: #111318;
  --bg-card: #161922;
  --bg-card-hover: #1c2030;
  --bg-elevated: #1e2235;
  --bg-input: #0d0f14;

  --border-subtle: rgba(255, 255, 255, 0.04);
  --border-default: rgba(255, 255, 255, 0.07);
  --border-accent: rgba(0, 210, 230, 0.25);

  --text-primary: #e8eaf0;
  --text-secondary: #8a8fa8;
  --text-tertiary: #555a70;
  --text-accent: #00d2e6;

  --accent: #00d2e6;
  --accent-glow: rgba(0, 210, 230, 0.15);
  --accent-deep: #0097a7;
  --accent-warm: #ff6b35;
  --accent-green: #00e676;
  --accent-red: #ff3d5a;
  --accent-yellow: #ffc400;
  --accent-purple: #b388ff;

  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;

  --font-display: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  --shadow-card: 0 2px 20px rgba(0,0,0,0.4), 0 0 0 1px var(--border-subtle);
  --shadow-glow: 0 0 40px rgba(0, 210, 230, 0.08);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

html {
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-display);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Ambient background texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0, 210, 230, 0.03), transparent),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(255, 107, 53, 0.02), transparent);
  pointer-events: none;
  z-index: 0;
}

/* Noise texture overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ================================================================
   LOGIN SCREEN
   ================================================================ */

#login-screen {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-primary);
  transition: opacity 0.6s ease, visibility 0.6s ease;
}

#login-screen.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.login-container {
  width: 100%;
  max-width: 480px;
  padding: 2rem;
  animation: loginReveal 0.8s ease both;
}

@keyframes loginReveal {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.login-brand {
  text-align: center;
  margin-bottom: 3rem;
}

.login-brand-icon {
  width: 64px;
  height: 64px;
  margin: 0 auto 1.2rem;
  border-radius: 18px;
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 32px rgba(0, 210, 230, 0.2);
}

.login-brand-icon svg {
  width: 32px;
  height: 32px;
  color: white;
}

.login-brand h1 {
  font-size: 1.8rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}

.login-brand p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-top: 0.4rem;
  font-weight: 300;
}

.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  padding: 2rem;
  box-shadow: var(--shadow-card);
}

.form-group {
  margin-bottom: 1.2rem;
}

.form-group label {
  display: block;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.5rem;
}

.form-group input {
  width: 100%;
  padding: 0.75rem 1rem;
  background: var(--bg-input);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  transition: var(--transition);
  outline: none;
}

.form-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.form-group input::placeholder {
  color: var(--text-tertiary);
  font-family: var(--font-display);
}

.form-group small {
  display: block;
  margin-top: 0.3rem;
  font-size: 0.72rem;
  color: var(--text-tertiary);
}

.form-divider {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 1.5rem 0;
  color: var(--text-tertiary);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.form-divider::before, .form-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-default);
}

.btn-login {
  width: 100%;
  padding: 0.85rem;
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  color: #fff;
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 600;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  margin-top: 0.5rem;
}

.btn-login:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(0, 210, 230, 0.25);
}

.btn-login:active {
  transform: translateY(0);
}

.btn-login:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.login-error {
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  background: rgba(255, 61, 90, 0.08);
  border: 1px solid rgba(255, 61, 90, 0.2);
  border-radius: var(--radius-sm);
  color: var(--accent-red);
  font-size: 0.82rem;
  display: none;
}

.login-error.visible { display: block; }

/* ================================================================
   MAIN DASHBOARD LAYOUT
   ================================================================ */

#dashboard {
  display: none;
  position: relative;
  z-index: 1;
  min-height: 100vh;
}

#dashboard.active { display: block; }

/* Top bar */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.8rem 2rem;
  background: rgba(10, 12, 16, 0.85);
  backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border-subtle);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.topbar-logo {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.topbar-logo svg { width: 18px; height: 18px; color: white; }

.topbar-title {
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.connection-badge {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.35rem 0.8rem;
  background: rgba(0, 230, 118, 0.08);
  border: 1px solid rgba(0, 230, 118, 0.15);
  border-radius: 100px;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--accent-green);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.connection-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent-green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.btn-topbar {
  padding: 0.4rem 0.9rem;
  background: transparent;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-family: var(--font-display);
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
}

.btn-topbar:hover {
  background: var(--bg-card-hover);
  color: var(--text-primary);
  border-color: var(--border-accent);
}

.btn-logout:hover {
  border-color: rgba(255, 61, 90, 0.4);
  color: var(--accent-red);
  background: rgba(255, 61, 90, 0.06);
}

/* Vehicle selector tabs */
.vehicle-tabs {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 1rem 2rem 0;
}

.vehicle-tab {
  padding: 0.6rem 1.2rem;
  background: var(--bg-card);
  border: 1px solid var(--border-default);
  border-bottom: none;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  color: var(--text-secondary);
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
}

.vehicle-tab:hover { color: var(--text-primary); background: var(--bg-card-hover); }

.vehicle-tab.active {
  background: var(--bg-card);
  color: var(--text-accent);
  border-color: var(--border-accent);
}

.vehicle-tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--accent);
}

.vehicle-tab .tab-vin {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-tertiary);
  display: block;
  margin-top: 0.1rem;
}

/* Main content area */
.main-content {
  padding: 0 2rem 2rem;
}

/* Hero status strip */
.hero-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
  padding: 1.5rem 0;
  animation: fadeInUp 0.5s ease both;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.hero-stat {
  background: var(--bg-card);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  padding: 1.2rem 1.4rem;
  position: relative;
  overflow: hidden;
  transition: var(--transition);
}

.hero-stat:hover {
  border-color: var(--border-accent);
  box-shadow: var(--shadow-glow);
}

.hero-stat-label {
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
  margin-bottom: 0.5rem;
}

.hero-stat-value {
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.1;
}

.hero-stat-value .unit {
  font-size: 0.8rem;
  font-weight: 400;
  color: var(--text-secondary);
  margin-left: 0.15rem;
}

.hero-stat-sub {
  font-size: 0.72rem;
  color: var(--text-secondary);
  margin-top: 0.3rem;
}

/* Color variants for hero stats */
.hero-stat.battery .hero-stat-value { color: var(--accent-green); }
.hero-stat.range .hero-stat-value { color: var(--accent); }
.hero-stat.speed .hero-stat-value { color: var(--text-primary); }
.hero-stat.temp .hero-stat-value { color: var(--accent-warm); }
.hero-stat.lock .hero-stat-value { color: var(--accent-purple); }
.hero-stat.mileage .hero-stat-value { color: var(--accent-yellow); }

/* Progress bar inside hero stat */
.hero-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: rgba(255,255,255,0.03);
}

.hero-progress-fill {
  height: 100%;
  border-radius: 0 2px 0 0;
  transition: width 1s ease;
}

.hero-stat.battery .hero-progress-fill { background: var(--accent-green); }
.hero-stat.range .hero-progress-fill { background: var(--accent); }

/* ================================================================
   SECTION CARDS
   ================================================================ */

.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 1rem;
  animation: fadeInUp 0.6s ease both;
  animation-delay: 0.15s;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: var(--transition);
}

.card:hover {
  border-color: var(--border-accent);
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.4rem;
  border-bottom: 1px solid var(--border-subtle);
}

.card-title {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.85rem;
  font-weight: 600;
}

.card-title-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.card-title-icon svg { width: 16px; height: 16px; }

.card-body {
  padding: 1.2rem 1.4rem;
}

/* Card sizes */
.card-full   { grid-column: span 12; }
.card-half   { grid-column: span 6; }
.card-third  { grid-column: span 4; }
.card-quarter { grid-column: span 3; }

/* ================================================================
   REMOTE CONTROLS
   ================================================================ */

.controls-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 0.8rem;
}

.ctrl-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
  padding: 1.2rem 0.8rem;
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  font-family: var(--font-display);
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.ctrl-btn:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-accent);
  color: var(--text-primary);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
}

.ctrl-btn:active {
  transform: translateY(0);
}

.ctrl-btn.executing {
  pointer-events: none;
  border-color: var(--accent);
}

.ctrl-btn.executing .ctrl-icon {
  animation: spin 1s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.ctrl-btn.success {
  border-color: var(--accent-green);
  background: rgba(0, 230, 118, 0.05);
}

.ctrl-btn.error {
  border-color: var(--accent-red);
  background: rgba(255, 61, 90, 0.05);
}

.ctrl-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

.ctrl-icon svg { width: 20px; height: 20px; }

.ctrl-btn.lock .ctrl-icon       { background: rgba(179, 136, 255, 0.12); color: var(--accent-purple); }
.ctrl-btn.unlock .ctrl-icon     { background: rgba(0, 230, 118, 0.12); color: var(--accent-green); }
.ctrl-btn.trunk .ctrl-icon      { background: rgba(0, 210, 230, 0.12); color: var(--accent); }
.ctrl-btn.find .ctrl-icon       { background: rgba(255, 196, 0, 0.12); color: var(--accent-yellow); }
.ctrl-btn.window .ctrl-icon     { background: rgba(0, 210, 230, 0.12); color: var(--accent); }
.ctrl-btn.climate .ctrl-icon    { background: rgba(255, 107, 53, 0.12); color: var(--accent-warm); }
.ctrl-btn.sunshade .ctrl-icon   { background: rgba(255, 196, 0, 0.12); color: var(--accent-yellow); }
.ctrl-btn.battery-ctl .ctrl-icon { background: rgba(0, 230, 118, 0.12); color: var(--accent-green); }

/* ================================================================
   DATA ROWS & DETAILS
   ================================================================ */

.data-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.7rem 0;
  border-bottom: 1px solid var(--border-subtle);
}

.data-row:last-child { border-bottom: none; }

.data-label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.data-value {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  color: var(--text-primary);
  text-align: right;
}

.data-value.good { color: var(--accent-green); }
.data-value.warn { color: var(--accent-yellow); }
.data-value.bad  { color: var(--accent-red); }

/* Status indicators */
.status-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 0.3rem;
}

.status-dot.green  { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
.status-dot.red    { background: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); }
.status-dot.yellow { background: var(--accent-yellow); box-shadow: 0 0 6px var(--accent-yellow); }
.status-dot.blue   { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.status-dot.off    { background: var(--text-tertiary); }

/* ================================================================
   TIRE PRESSURE VISUAL
   ================================================================ */

.tire-visual {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  grid-template-rows: auto auto;
  gap: 0.8rem 2rem;
  align-items: center;
  justify-items: center;
  padding: 1rem 0;
}

.tire-cell {
  text-align: center;
}

.tire-value {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text-primary);
}

.tire-label {
  font-size: 0.65rem;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 0.2rem;
}

.tire-car-icon {
  grid-row: span 2;
  width: 60px;
  height: 100px;
  border: 2px solid var(--border-default);
  border-radius: 12px 12px 8px 8px;
  position: relative;
  opacity: 0.4;
}

.tire-car-icon::before {
  content: '';
  position: absolute;
  top: 15%;
  left: 10%;
  right: 10%;
  bottom: 30%;
  border: 1px solid var(--border-default);
  border-radius: 6px 6px 4px 4px;
}

/* ================================================================
   CHARGE LIMIT SLIDER
   ================================================================ */

.charge-limit-section {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 0;
}

.charge-slider-wrapper {
  flex: 1;
  position: relative;
}

.charge-slider {
  -webkit-appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  background: var(--bg-elevated);
  outline: none;
}

.charge-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent-green);
  cursor: pointer;
  box-shadow: 0 0 10px rgba(0, 230, 118, 0.3);
  transition: var(--transition);
}

.charge-slider::-webkit-slider-thumb:hover {
  transform: scale(1.2);
}

.charge-limit-value {
  font-family: var(--font-mono);
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--accent-green);
  min-width: 50px;
  text-align: right;
}

.btn-set-charge {
  padding: 0.5rem 1rem;
  background: rgba(0, 230, 118, 0.1);
  border: 1px solid rgba(0, 230, 118, 0.2);
  border-radius: var(--radius-sm);
  color: var(--accent-green);
  font-family: var(--font-display);
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}

.btn-set-charge:hover {
  background: rgba(0, 230, 118, 0.15);
  border-color: rgba(0, 230, 118, 0.3);
}

/* ================================================================
   LOCATION MAP
   ================================================================ */

.map-container {
  width: 100%;
  height: 260px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--bg-elevated);
  position: relative;
}

.map-container iframe {
  width: 100%;
  height: 100%;
  border: none;
  filter: invert(0.9) hue-rotate(180deg) brightness(0.8) contrast(1.2);
}

.map-coords {
  display: flex;
  gap: 1.5rem;
  margin-top: 0.8rem;
}

.map-coord {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-secondary);
}

.map-coord span { color: var(--text-accent); }

.no-location {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-tertiary);
  font-size: 0.85rem;
}

/* ================================================================
   TOAST NOTIFICATION
   ================================================================ */

.toast-container {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  pointer-events: none;
}

.toast {
  padding: 0.8rem 1.2rem;
  background: var(--bg-card);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  font-size: 0.82rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  pointer-events: auto;
  animation: toastIn 0.35s ease both;
  max-width: 400px;
}

.toast.success { border-color: rgba(0, 230, 118, 0.3); }
.toast.error   { border-color: rgba(255, 61, 90, 0.3); }

.toast.removing { animation: toastOut 0.3s ease both; }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(40px); }
  to   { opacity: 1; transform: translateX(0); }
}

@keyframes toastOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(40px); }
}

/* ================================================================
   LOADING STATE
   ================================================================ */

.loading-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(10, 12, 16, 0.8);
  backdrop-filter: blur(4px);
  z-index: 10;
  border-radius: inherit;
}

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border-default);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.refresh-btn {
  padding: 0.3rem 0.7rem;
  background: transparent;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 0.7rem;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

.refresh-btn:hover {
  border-color: var(--border-accent);
  color: var(--text-accent);
}

.refresh-btn svg { width: 12px; height: 12px; }

/* ================================================================
   RAW DATA VIEWER
   ================================================================ */

.raw-data-toggle {
  padding: 0.4rem 0.8rem;
  background: transparent;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  cursor: pointer;
  transition: var(--transition);
}

.raw-data-toggle:hover {
  color: var(--text-secondary);
  border-color: var(--border-accent);
}

.raw-data-panel {
  display: none;
  max-height: 400px;
  overflow: auto;
  background: var(--bg-input);
  border-radius: var(--radius-sm);
  padding: 1rem;
  margin-top: 1rem;
}

.raw-data-panel.open { display: block; }

.raw-data-panel pre {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-all;
}

/* ================================================================
   RESPONSIVE
   ================================================================ */

@media (max-width: 1100px) {
  .card-half, .card-third { grid-column: span 6; }
  .card-quarter { grid-column: span 6; }
}

@media (max-width: 768px) {
  .topbar { padding: 0.8rem 1rem; }
  .vehicle-tabs { padding: 1rem 1rem 0; }
  .main-content { padding: 0 1rem 1rem; }
  .card-half, .card-third, .card-quarter { grid-column: span 12; }
  .hero-strip { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
  .controls-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
}

/* ================================================================
   CAR IMAGE HERO
   ================================================================ */

.car-image-hero {
  position: relative;
  width: 100%;
  margin-bottom: 0.5rem;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--bg-card);
  border: 1px solid var(--border-default);
  animation: fadeInUp 0.5s ease both;
}

.car-image-hero img {
  width: 100%;
  max-height: 320px;
  object-fit: contain;
  display: block;
  margin: 0 auto;
  padding: 1.5rem 2rem;
  filter: drop-shadow(0 8px 32px rgba(0, 0, 0, 0.4));
}

.car-image-hero .car-image-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 1.2rem 1.6rem;
  background: linear-gradient(transparent, rgba(10, 12, 16, 0.85));
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.car-image-hero .car-image-name {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text-primary);
}

.car-image-hero .car-image-vin {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-tertiary);
  margin-top: 0.15rem;
}

.car-image-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 180px;
  color: var(--text-tertiary);
  font-size: 0.82rem;
  gap: 0.6rem;
}

.car-image-loading .spinner {
  width: 20px;
  height: 20px;
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }
</style>
</head>
<body>

<!-- ============================================================
     LOGIN SCREEN
     ============================================================ -->
<div id="login-screen">
  <div class="login-container">
    <div class="login-brand">
      <div class="login-brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.5 2.8C1.4 11.3 1 12.1 1 13v3c0 .6.4 1 1 1h2"/>
          <circle cx="7" cy="17" r="2"/>
          <circle cx="17" cy="17" r="2"/>
        </svg>
      </div>
      <h1>Leapmotor</h1>
      <p>Vehicle Command Center</p>
    </div>

    <div class="login-card">
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-username" placeholder="your@email.com" required>
        </div>
        <div class="form-group">

        </div>

        <div class="form-divider">Certificates</div>

        <div class="form-group">

        <div class="form-group">

        </div>

        <div class="form-group">

          <small>Without a PIN, only read-only data is available</small>

        <div class="form-group">
          <label>P12 Password</label>
          <input type="password" id="login-p12" placeholder="Auto-derived if empty">
          <small>Account certificate password (usually auto-detected)</small>
        </div>

        <button type="submit" class="btn-login" id="btn-login">Connect to Leapmotor</button>
        <div class="login-error" id="login-error"></div>
      </form>

  </div>
</div>

<!-- ============================================================
     MAIN DASHBOARD
     ============================================================ -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.5 2.8C1.4 11.3 1 12.1 1 13v3c0 .6.4 1 1 1h2"/>
          <circle cx="7" cy="17" r="2"/>
          <circle cx="17" cy="17" r="2"/>
        </svg>
      </div>
      <span class="topbar-title">Leapmotor Command Center</span>
    </div>
    <div class="topbar-right">
      <div class="connection-badge">
        <span class="connection-dot"></span>
        Connected
      </div>
      <button class="btn-topbar" onclick="refreshAll()">
        <svg style="width:12px;height:12px;display:inline;vertical-align:middle;margin-right:4px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 2v6h-6M3 12a9 9 0 0115.5-6.4L21 8M3 22v-6h6M21 12a9 9 0 01-15.5 6.4L3 16"/></svg>
        Refresh
      </button>
      <button class="btn-topbar btn-logout" onclick="doLogout()">
        <svg style="width:12px;height:12px;display:inline;vertical-align:middle;margin-right:4px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </div>

  <div class="vehicle-tabs" id="vehicle-tabs"></div>

  <div class="main-content" id="main-content">
    <div style="display:flex;align-items:center;justify-content:center;height:60vh;color:var(--text-tertiary)">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- ============================================================
     JAVASCRIPT ENGINE
     ============================================================ -->
<script>
// ==================================================================
// STATE
// ==================================================================
let state = {
  connected: false,
  vehicles: [],
  selectedVin: null,
  vehicleData: {},
  hasPin: false,
};

// ==================================================================
// API HELPERS
// ==================================================================
async function api(method, path, body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

// ==================================================================
// TOAST
// ==================================================================
function toast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
  const iconColor = type === 'success' ? 'var(--accent-green)' : type === 'error' ? 'var(--accent-red)' : 'var(--accent)';
  el.innerHTML = `<span style="color:${iconColor};font-weight:700">${icon}</span> ${escapeHtml(message)}`;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('removing');
    setTimeout(() => el.remove(), 300);
  }, 4000);
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ==================================================================
// LOGIN
// ==================================================================
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('visible');
  btn.disabled = true;
  btn.textContent = 'Connecting…';

  try {
    const result = await api('POST', '/api/login', {
      username: document.getElementById('login-username').value,
      password: document.getElementById('login-password').value,
      app_cert_path: document.getElementById('login-cert').value,
      app_key_path: document.getElementById('login-key').value,
      operation_password: document.getElementById('login-pin').value,
      account_p12_password: document.getElementById('login-p12').value,
    });

    state.connected = true;
    state.vehicles = result.vehicles || [];
    state.hasPin = !!document.getElementById('login-pin').value;

    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard').classList.add('active');

    if (state.vehicles.length > 0) {
      state.selectedVin = state.vehicles[0].vin;
      renderVehicleTabs();
      loadVehicleData(state.selectedVin);
    }

    toast('Connected successfully', 'success');
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Connect to Leapmotor';
  }
});

async function doLogout() {
  try { await api('POST', '/api/logout'); } catch {}
  state = { connected: false, vehicles: [], selectedVin: null, vehicleData: {}, hasPin: false };
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('dashboard').classList.remove('active');
  toast('Disconnected');
}

// ==================================================================
// VEHICLE TABS
// ==================================================================
function renderVehicleTabs() {
  const container = document.getElementById('vehicle-tabs');
  container.innerHTML = state.vehicles.map(v => `
    <button class="vehicle-tab ${v.vin === state.selectedVin ? 'active' : ''}"
            onclick="selectVehicle('${v.vin}')">
      ${escapeHtml(v.nickname || v.car_type || 'Vehicle')}
      <span class="tab-vin">${escapeHtml(v.vin.slice(-8))}</span>
    </button>
  `).join('');
}

function selectVehicle(vin) {
  state.selectedVin = vin;
  renderVehicleTabs();
  if (state.vehicleData[vin]) {
    renderDashboard(state.vehicleData[vin]);
  } else {
    loadVehicleData(vin);
  }
}

async function loadVehicleData(vin) {
  const mc = document.getElementById('main-content');
  mc.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:60vh"><div class="spinner"></div></div>';

  try {
    const data = await api('GET', `/api/vehicles/${vin}/full`);
    state.vehicleData[vin] = data;
    renderDashboard(data);
  } catch (err) {
    mc.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:60vh;color:var(--accent-red)">${escapeHtml(err.message)}</div>`;
    toast(err.message, 'error');
  }
}

async function refreshAll() {
  if (state.selectedVin) {
    delete state.vehicleData[state.selectedVin];
    await loadVehicleData(state.selectedVin);
    toast('Data refreshed', 'success');
  }
}

// ==================================================================
// RENDER DASHBOARD
// ==================================================================
function renderDashboard(data) {
  const s = data.status || {};
  const v = data.vehicle || {};
  const m = (data.mileage && data.mileage.data) || {};
  const p = (data.picture && data.picture.data) || {};
  const bat = s.battery || {};
  const drv = s.driving || {};
  const loc = s.location || {};
  const clm = s.climate || {};
  const drs = s.doors || {};
  const win = s.windows || {};
  const tir = s.tires || {};
  const con = s.connectivity || {};
  const ign = s.ignition || {};
  const ts = s.timestamps || {};

  const soc = bat.soc ?? '—';
  const range = bat.expected_mileage ?? '—';
  const speed = drv.speed ?? 0;
  const mileage = drv.total_mileage ?? m.totalmileage ?? '—';
  const outTemp = clm.outdoor_temp ?? '—';
  const locked = drs.is_locked;
  const vin = v.vin || state.selectedVin;

  const mc = document.getElementById('main-content');
  mc.innerHTML = `
    <!-- CAR IMAGE -->
    <div class="car-image-hero" id="car-image-hero">
      <div class="car-image-loading"><div class="spinner"></div> Loading vehicle image…</div>
    </div>

    <!-- HERO STRIP -->
    <div class="hero-strip">
      <div class="hero-stat battery">
        <div class="hero-stat-label">Battery</div>
        <div class="hero-stat-value">${soc !== '—' ? soc : '—'}<span class="unit">${soc !== '—' ? '%' : ''}</span></div>
        <div class="hero-stat-sub">${bat.is_charging ? '⚡ Charging' : bat.charge_remain_time ? `${bat.charge_remain_time} min remaining` : 'Not charging'}</div>
        ${soc !== '—' ? `<div class="hero-progress"><div class="hero-progress-fill" style="width:${soc}%"></div></div>` : ''}
      </div>
      <div class="hero-stat range">
        <div class="hero-stat-label">Range</div>
        <div class="hero-stat-value">${range !== '—' ? range : '—'}<span class="unit">${range !== '—' ? 'km' : ''}</span></div>
        <div class="hero-stat-sub">${bat.dump_energy != null ? `${bat.dump_energy} kWh available` : ''}</div>
      </div>
      <div class="hero-stat speed">
        <div class="hero-stat-label">Speed</div>
        <div class="hero-stat-value">${speed}<span class="unit">km/h</span></div>
        <div class="hero-stat-sub">${drv.is_parked ? 'Parked' : 'Moving'}</div>
      </div>
      <div class="hero-stat mileage">
        <div class="hero-stat-label">Odometer</div>
        <div class="hero-stat-value">${typeof mileage === 'number' ? mileage.toLocaleString() : mileage}<span class="unit">${typeof mileage === 'number' ? 'km' : ''}</span></div>
        <div class="hero-stat-sub">${m.deliveryDays ? `${m.deliveryDays} days since delivery` : ''}</div>
      </div>
      <div class="hero-stat temp">
        <div class="hero-stat-label">Outside Temp</div>
        <div class="hero-stat-value">${outTemp !== '—' ? outTemp : '—'}<span class="unit">${outTemp !== '—' ? '°C' : ''}</span></div>
        <div class="hero-stat-sub">${clm.ac_switch ? 'A/C active' : 'A/C off'}</div>
      </div>
      <div class="hero-stat lock">
        <div class="hero-stat-label">Lock Status</div>
        <div class="hero-stat-value">${locked === true ? '🔒 Locked' : locked === false ? '🔓 Open' : '—'}</div>
        <div class="hero-stat-sub">${ts.collect_time ? 'Updated ' + formatTime(ts.collect_time) : ''}</div>
      </div>
    </div>

    <!-- DASHBOARD GRID -->
    <div class="dashboard-grid">

      <!-- REMOTE CONTROLS -->
      <div class="card card-full">
        <div class="card-header">
          <div class="card-title">
            <div class="card-title-icon" style="background:rgba(0,210,230,0.1);color:var(--accent)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            Remote Controls
          </div>
          ${!state.hasPin ? '<span style="font-size:0.72rem;color:var(--accent-yellow)">⚠ PIN required for remote actions</span>' : ''}
        </div>
        <div class="card-body">
          <div class="controls-grid">
            ${renderControlBtn('lock', 'Lock', vin, 'lock', `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>`)}
            ${renderControlBtn('unlock', 'Unlock', vin, 'unlock', `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 019.9-1"/></svg>`)}
            ${renderControlBtn('trunk', 'Open Trunk', vin, 'trunk', `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>`)}
            ${renderControlBtn('trunk', 'Close Trunk', vin, 'trunk', `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><line x1="9" y1="22" x2="9" y2="12"/><line x1="15" y1="22" x2="15" y2="12"/></svg>`, 'trunk/close')}
            ${renderControlBtn('find', 'Find Car', vin, 'find', `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`)}
            ${renderControlBtn('window', 'Open Windows', vin, 'window', `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/></svg>`, 'windows/open')}
            ${renderControlBtn('window', 'Close Windows', vin, 'window', `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>`, 'windows/close')}
            ${renderControlBtn('sunshade', 'Open Sunshade', vin, 'sunshade', `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`, 'sunshade/open')}

async function loadCarImage(vin, vehicleInfo) {
  const hero = document.getElementById('car-image-hero');
  if (!hero) return;

  try {
    const res = await fetch(`/api/vehicles/${vin}/picture/image`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const name = vehicleInfo.nickname || vehicleInfo.car_type || 'Leapmotor';
    hero.innerHTML = `
      <img src="${url}" alt="${escapeHtml(name)}">
      <div class="car-image-overlay">
        <div>
          <div class="car-image-name">${escapeHtml(name)}</div>
          <div class="car-image-vin">${escapeHtml(vin)}</div>
        </div>
      </div>
    `;
  } catch {
    // No image available — collapse the hero
    hero.style.display = 'none';
  }
}

// ==================================================================
// CONTROL BUTTON RENDERER
// ==================================================================
function renderControlBtn(cssClass, label, vin, category, iconSvg, actionPath = null) {
  const path = actionPath || category;
  return `
    <button class="ctrl-btn ${cssClass}" onclick="execControl(this, '${vin}', '${path}')" ${!state.hasPin ? 'title="PIN required"' : ''}>
      <div class="ctrl-icon">${iconSvg}</div>
      ${escapeHtml(label)}
    </button>
  `;
}

async function execControl(btn, vin, action) {
  if (!state.hasPin) {
    toast('Vehicle PIN required for remote controls', 'error');
    return;
  }
  btn.classList.add('executing');
  btn.classList.remove('success', 'error');
  try {
    await api('POST', `/api/vehicles/${vin}/${action}`);
    btn.classList.remove('executing');
    btn.classList.add('success');
    toast(`${action} executed successfully`, 'success');
    setTimeout(() => btn.classList.remove('success'), 3000);
  } catch (err) {
    btn.classList.remove('executing');
    btn.classList.add('error');
    toast(`${action} failed: ${err.message}`, 'error');
    setTimeout(() => btn.classList.remove('error'), 3000);
  }
}

async function setChargeLimit(vin) {
  const slider = document.getElementById('charge-slider');
  if (!slider) return;
  const limit = parseInt(slider.value);
  if (!state.hasPin) {
    toast('Vehicle PIN required', 'error');
    return;
  }
  try {
    await api('POST', `/api/vehicles/${vin}/charge-limit`, { limit });
    toast(`Charge limit set to ${limit}%`, 'success');
  } catch (err) {
    toast(`Failed to set charge limit: ${err.message}`, 'error');
  }
}

// ==================================================================
// HELPERS
// ==================================================================
function doorState(val) {
  if (val === true) return '<span class="data-value bad">Open</span>';
  if (val === false) return '<span class="data-value good">Closed</span>';
  return '—';
}

function climateMode(val) {
  const modes = { 0: 'Off', 1: 'Cooling', 2: 'Heating', 3: 'Auto' };
  return modes[val] || `Mode ${val}`;
}

function gearLabel(val) {
  const gears = { 0: 'P', 1: 'R', 2: 'N', 3: 'D' };
  return gears[val] || `Gear ${val}`;
}

function formatTime(isoStr) {
  try {
    const d = new Date(isoStr);
    return d.toLocaleString();
  } catch { return isoStr; }
}

function toggleRawData() {
  document.getElementById('raw-data-panel')?.classList.toggle('open');
}

async function init() {
  try {
    const data = await api('GET', '/api/status');
    if (data.connected && data.vehicles && data.vehicles.length > 0) {
      state.connected = true;
      state.vehicles = data.vehicles;
      state.hasPin = data.has_pin;
      state.selectedVin = data.vehicles[0].vin;

      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.add('active');

      renderVehicleTabs();
      loadVehicleData(state.selectedVin);
      toast('Session restored', 'success');
    }
  } catch {
    // Not connected — stay on login screen
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
